<!DOCTYPE html>
<html>
<head>
  <title>Productivity Dashboard</title>
  <style>
    body {
      font-family: Arial;
      background: #f4f6f8;
      padding: 30px;
    }
    h1 {
      text-align: center;
      margin-bottom: 25px;
    }
    table {
      width: 80%;
      margin: auto;
      border-collapse: collapse;
      background: white;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    th, td {
      padding: 12px;
      border: 1px solid #ccc;
      text-align: center;
    }
    th {
      background: black;
      color: white;
    }
  </style>
</head>
<body>

<h1>Weekly Productivity Report</h1>

<table>
  <thead>
    <tr>
      <th>Website</th>
      <th>Time Spent (seconds)</th>
      <th>Category</th>
    </tr>
  </thead>
  <tbody id="data"></tbody>
</table>

<script>
fetch("/api/stats")
  .then(res => res.json())
  .then(data => {
    let rows = "";
    data.forEach(item => {
      rows += `<tr>
        <td>${item.website}</td>
        <td>${item.timeSpent}</td>
        <td>${item.category}</td>
      </tr>`;
    });
    document.getElementById("data").innerHTML = rows;
  });
</script>

</body>
</html>
